name: Download Packages for Offline Use

on:
  workflow_dispatch:
    inputs:
      urls:
        description: >
          GitHub URLs to requirements.txt files (one per line or space-separated). Leave empty if using packages below.
        required: false
        type: string
      packages:
        description: >
          Individual packages to download (space-separated). E.g: flask django numpy pandas colorama
        required: false
        type: string
      merge:
        description: Merge everything into a single zip
        required: false
        default: false
        type: boolean
      check_missing:
        description: Scan repo(s) for imports not listed in requirements
        required: false
        default: false
        type: boolean
      platform:
        description: "Target OS (default: win_amd64 = Windows 64-bit)"
        required: false
        default: "win_amd64"
        type: choice
        options:
          - win_amd64
          - win32
          - manylinux2014_x86_64
          - manylinux2014_aarch64
          - macosx_11_0_x86_64
          - macosx_11_0_arm64
      python_version:
        description: "Python version on your offline machine"
        required: false
        default: "311"
        type: choice
        options:
          - "39"
          - "310"
          - "311"
          - "312"
          - "313"

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script deps
        run: pip install requests

      - name: Run pack.py
        run: |
          INPUTS=""

          # Add GitHub URLs if provided
          if [ -n "${{ github.event.inputs.urls }}" ]; then
            URL_ARGS=$(echo "${{ github.event.inputs.urls }}" | tr '\n' ' ' | xargs)
            INPUTS="$INPUTS $URL_ARGS"
          fi

          # Add direct package names if provided
          if [ -n "${{ github.event.inputs.packages }}" ]; then
            INPUTS="$INPUTS ${{ github.event.inputs.packages }}"
          fi

          if [ -z "$INPUTS" ]; then
            echo "ERROR: Provide at least one URL or package name."
            exit 1
          fi

          EXTRA_FLAGS="--platform ${{ github.event.inputs.platform }} --python-version ${{ github.event.inputs.python_version }}"

          if [ "${{ github.event.inputs.merge }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --merge"
          fi
          if [ "${{ github.event.inputs.check_missing }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --check-missing"
          fi

          python pack.py $INPUTS --output-dir packages $EXTRA_FLAGS

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-packages
          path: packages/*.zip
          retention-days: 7
